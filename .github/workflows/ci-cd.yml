name: CI/CD Pipeline

on:
  push:
    branches: [ homework-docker, develop, main ]
  pull_request:
    branches: [ develop, main ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest pytest-django

      - name: Run flake8
        run: |
          flake8 . --exclude=migrations,venv,__pycache__ --count --show-source --statistics

      - name: Run tests
        run: |
          pytest
        env:
          DJANGO_SECRET_KEY: test-secret-key
          DEBUG: True
          DB_ENGINE: django.db.backends.sqlite3
          TELEGRAM_BOT_TOKEN: test-token

      - name: Check Docker build
        run: |
          docker build -t habit-tracker-test .

  deploy:
    needs: test-and-lint
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/homework-docker' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v3

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml,nginx.conf,.env.sample"
          target: "/home/{{ secrets.SERVER_USER }}/habit-tracker"

      - name: Deploy to server
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/${{ secrets.SERVER_USER }}/habit-tracker
            
            # Создать .env из секрета
            echo "${{ secrets.ENV_FILE }}" > .env
            
            # Остановить старые контейнеры
            docker-compose down
            
            # Запустить с пересборкой
            docker-compose --profile beat up -d --build
            
            # Очистить старые образы
            docker image prune -f
            
            # Проверить статус
            docker-compose ps